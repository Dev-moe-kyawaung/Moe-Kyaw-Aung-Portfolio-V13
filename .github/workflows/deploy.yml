# ============================================================
# GitHub Actions — Auto Deploy to GitHub Pages
# Repo: Moe-Kyaw-Aung-Portfolio-V13
# Author: Moe Kyaw Aung (မိုးကျော်အောင်)
# ============================================================

name: 🚀 Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ── Job 1: Validate HTML ────────────────────────────────
  validate:
    name: ✅ Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html exists
        run: |
          if [ ! -f "index.html" ]; then
            echo "❌ index.html not found!"
            exit 1
          fi
          echo "✅ index.html found ($(wc -c < index.html) bytes)"

      - name: Check file size
        run: |
          SIZE=$(wc -c < index.html)
          echo "📦 Portfolio size: ${SIZE} bytes"
          if [ $SIZE -lt 1000 ]; then
            echo "⚠️ File seems too small — check content"
            exit 1
          fi
          echo "✅ File size OK"

  # ── Job 2: Build & Deploy ───────────────────────────────
  deploy:
    name: 🌐 Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Upload entire repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 🎉 Deployment Summary
        run: |
          echo "======================================"
          echo "  Portfolio V13 Deployed Successfully "
          echo "======================================"
          echo "  URL: ${{ steps.deployment.outputs.page_url }}"
          echo "  Branch: main"
          echo "  Commit: ${{ github.sha }}"
          echo "======================================"
